<div class="pin-to-viewport">
  <div class="outer-frame">
    <div class="results-wrapper text-center">

      <div *ngIf="isLoading && !isFinalizing && !isDeleting" class="loading-state">
        <div class="spinner"></div>
        <h2>🚀 Creating Product Page...</h2>
        <p class="lead">Please wait. This may take up to a few minutes.</p>
        <div class="progress-bar-container">
          <div class="progress-bar-value"></div>
        </div>
      </div>

      <div *ngIf="isFinalizing" class="loading-state">
        <div class="spinner"></div>
        <h2>⚙️ Finalizing...</h2>
      </div>

      <div *ngIf="isDeleting" class="loading-state">
        <div class="spinner"></div>
        <h2>🗑️ Deleting...</h2>
      </div>

      <div *ngIf="error" class="error-state">
        <div class="icon error">❌</div>
        <h2 class="text-danger">Submission Failed</h2>
        <p class="alert alert-danger">{{ error }}</p>
        <div class="actions">
          <button class="btn btn-warning" (click)="onBackClick()">
            ← Return to Dashboard
          </button>
        </div>
      </div>

    </div> 
  </div>
</div>
